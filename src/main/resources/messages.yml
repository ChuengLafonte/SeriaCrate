# ==========================================
# MESSAGES & BROADCASTS
# ==========================================
prefix: "&7&9&1&E&F&Fᴘʀᴏᴊᴇᴄᴛ ꜱᴇʀɪᴀ &7» "

# Pesan Sukses
success:
  open-crate: "%prefix%&fMembuka Crate..."
  receive-reward: "%prefix%&fSelamat! Kamu memenangkan hadiah dari crate!"
  resin-consume: "&c-%amount% 🔲 Resin &7(&6%current%&7/&6%max%&7)"

# ==========================================
# BROADCAST KEMENANGAN (PER TIER)
# Variabel: %player%, %reward%, %crate%, %tier%
# ==========================================
broadcast:
  # Broadcast default jika tier tidak memiliki format khusus
  default:
    - "%prefix%&b%player% &ftelah memenangkan &a%reward% &fdari Crate &d%crate% &7(Tier %tier%)!"
    
  # Format khusus untuk Tier S (Sesuai Skript milikmu)
  s:
    - "<#BC8EFF>◤─────────────────────────◥"
    - "                  <#FFE300>&lCONGRATULATIONS!"
    - "                  <#3d96dc>%player% <#f6d3bb>ᴍᴇɴᴅᴀᴘᴀᴛᴋᴀɴ"
    - "                  %reward% <#FFE300>[<#FFEC3F>TIER <#FFEA2F>S<#FFE300>]"
    - "          <#f6d3bb>ᴅᴀʀɪ &6%crate%!"
    - "<#BC8EFF>◣─────────────────────────◢"

# Pesan Error / Penolakan
error:
  not-enough-resin: "%prefix%&cResin tidak cukup! Butuh &6%amount% 🔲 &c(Milikmu: &6%current%&c)"
  already-claimed: "%prefix%&cKamu sudah mengambil hadiah di crate ini!"
  no-rewards-setup: "%prefix%&cHadiah untuk crate ini belum diatur di tier &e%tier%&c."
  internal-error: "%prefix%&cTerjadi kesalahan saat membuka Crate! Silakan lapor ke Admin."
  no-permission: "%prefix%&cKamu tidak memiliki izin untuk melakukan ini."