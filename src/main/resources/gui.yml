# ==========================================
# PROJECT SERIA - ULTIMATE GUI CONFIGURATION
# ==========================================
# Panduan Sistem Priority & Slot:
# - priority: Angka lebih tinggi (misal 10) akan menimpa item dengan priority lebih rendah (misal 0).
# - slots: Bisa menggunakan slot tunggal (["4", "13"]) atau rentang/range (["0-8", "45-53"]).

