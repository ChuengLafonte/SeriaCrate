# ==========================================
# COMMAND ALIASES & REWARD COMMANDS
# ==========================================
# Kamu bisa mendaftarkan kumpulan command di sini dan memanggil
# namanya saja di file reward crate (misalnya: cmd: "beri_uang_100k")

reward-commands:
  beri_uang_150k:
    - "eco give %player_name% 150000"
    - "say %player_name% baru saja menjadi kaya!"
  beri_pet_seed:
    - "ecopets giveegg %player_name% fighting_seed"
  beri_farmer_essence:
    - "mi give MISCELLANEOUS FARMER_ESSENCE %player_name% 1"

# Command utama plugin (bisa diatur permission & aliasnya)
plugin-commands:
  resin:
    permission: "seriacrate.player"
    aliases: ["stamina", "energi"]
  scrate:
    permission: "seriacrate.admin"
    aliases: ["seriacrate", "crateadmin"]